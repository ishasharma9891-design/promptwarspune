steps:
  # --- Backend Deployment ---
  # 1. Build and push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Backend'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/yaris-backend', './backend']
  
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Backend'
    args: ['push', 'gcr.io/$PROJECT_ID/yaris-backend']

  # 2. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Backend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'yaris-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/yaris-backend'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'NODE_ENV=production'

  # --- Frontend Deployment ---
  # 3. Build and push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Frontend'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/yaris-frontend', './frontend']
  
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Frontend'
    args: ['push', 'gcr.io/$PROJECT_ID/yaris-frontend']

  # 4. Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Frontend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'yaris-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/yaris-frontend'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/yaris-backend'
  - 'gcr.io/$PROJECT_ID/yaris-frontend'

options:
  logging: CLOUD_LOGGING_ONLY
